name: Build and Push Docker Image (manual)

# Manual trigger only.
# Run from: GitHub repo -> Actions -> "Build and Push Docker Image (manual)" -> Run workflow
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. latest, v1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${REGISTRY}/${{ steps.img.outputs.name }}:${{ inputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${REGISTRY}/${{ steps.img.outputs.name }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
